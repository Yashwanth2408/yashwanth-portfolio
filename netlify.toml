[build]
  command = "echo 'No build needed'"
  publish = "."
  functions = "netlify/functions"

[dev]
  functions = "netlify/functions"
  command = "echo 'Dev server'"

[[redirects]]
  from = "/api/llm"
  to = "/.netlify/functions/llm"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env]
  PORT = "3000"
